name: Build RPi AppImage (aarch64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsecret-1-dev libfuse2

      - name: Install appimagetool (aarch64)
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/latest/download/appimagetool-aarch64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build RPi AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./scripts/build_rpi_appimage.sh

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Ham_Net_Manager-aarch64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
